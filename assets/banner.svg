<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&amp;display=swap');

      .bg { fill: #0d1017; }
      .grid-line { stroke: #1a2030; stroke-width: 0.5; }
      .scan-line { fill: #00ff88; opacity: 0; animation: scan 4s linear infinite; }
      .title { font-family: 'IBM Plex Mono', monospace; font-size: 36px; font-weight: 700; fill: #00ff88; }
      .subtitle { font-family: 'IBM Plex Mono', monospace; font-size: 13px; fill: #4a9ef0; }
      .tag { font-family: 'IBM Plex Mono', monospace; font-size: 11px; fill: #0d1017; }
      .tag-bg-green { fill: #00ff88; rx: 4; }
      .tag-bg-blue { fill: #4a9ef0; }
      .tag-bg-red { fill: #f07070; }
      .cursor { fill: #00ff88; animation: blink 1s step-end infinite; }
      .dot { fill: #00ff88; animation: pulse 2s ease-in-out infinite; }
      .dot2 { fill: #4a9ef0; animation: pulse 2s ease-in-out infinite 0.3s; }
      .dot3 { fill: #f07070; animation: pulse 2s ease-in-out infinite 0.6s; }
      .chain-text { font-family: 'IBM Plex Mono', monospace; font-size: 10px; fill: #2a3a4a; }
      .chain-active { fill: #00ff88; animation: chainFlow 3s linear infinite; }
      .chain-active2 { fill: #4a9ef0; animation: chainFlow 3s linear infinite 1s; }
      .chain-active3 { fill: #f07070; animation: chainFlow 3s linear infinite 2s; }
      .glow { filter: url(#glow); }
      .border-anim { stroke: #00ff88; stroke-width: 1; fill: none; stroke-dasharray: 8 4; animation: dash 20s linear infinite; }
      .corner { fill: none; stroke: #00ff88; stroke-width: 1.5; }
      .scanbar { fill: url(#scanGrad); opacity: 0.03; animation: scanBar 6s linear infinite; }

      @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
      @keyframes pulse { 0%, 100% { opacity: 0.3; r: 3; } 50% { opacity: 1; r: 5; } }
      @keyframes dash { to { stroke-dashoffset: -200; } }
      @keyframes chainFlow {
        0% { opacity: 0.2; }
        50% { opacity: 1; }
        100% { opacity: 0.2; }
      }
      @keyframes scanBar {
        0% { transform: translateY(-200px); }
        100% { transform: translateY(400px); }
      }
      @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .title { animation: fadeInUp 0.8s ease forwards; }
      .subtitle { animation: fadeInUp 0.8s ease 0.3s both; }
      .tags-group { animation: fadeInUp 0.8s ease 0.6s both; }
      .chain-group { animation: fadeInUp 0.8s ease 0.9s both; }
    </style>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <filter id="glowStrong" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="scanGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0"/>
      <stop offset="50%" stop-color="#00ff88" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1017"/>
      <stop offset="100%" stop-color="#0a1520"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" fill="url(#bgGrad)" rx="8"/>

  <!-- Grid -->
  <g opacity="0.4">
    <line x1="0" y1="40" x2="800" y2="40" class="grid-line"/>
    <line x1="0" y1="80" x2="800" y2="80" class="grid-line"/>
    <line x1="0" y1="120" x2="800" y2="120" class="grid-line"/>
    <line x1="0" y1="160" x2="800" y2="160" class="grid-line"/>
    <line x1="100" y1="0" x2="100" y2="200" class="grid-line"/>
    <line x1="200" y1="0" x2="200" y2="200" class="grid-line"/>
    <line x1="300" y1="0" x2="300" y2="200" class="grid-line"/>
    <line x1="400" y1="0" x2="400" y2="200" class="grid-line"/>
    <line x1="500" y1="0" x2="500" y2="200" class="grid-line"/>
    <line x1="600" y1="0" x2="600" y2="200" class="grid-line"/>
    <line x1="700" y1="0" x2="700" y2="200" class="grid-line"/>
  </g>

  <!-- Scan bar -->
  <rect class="scanbar" x="0" y="0" width="800" height="40"/>

  <!-- Corner decorations -->
  <polyline points="8,25 8,8 25,8" class="corner"/>
  <polyline points="775,8 792,8 792,25" class="corner"/>
  <polyline points="8,175 8,192 25,192" class="corner"/>
  <polyline points="775,192 792,192 792,175" class="corner"/>

  <!-- Animated border -->
  <rect x="4" y="4" width="792" height="192" rx="6" class="border-anim"/>

  <!-- Left accent line -->
  <rect x="36" y="30" width="2" height="140" fill="#00ff88" opacity="0.15" rx="1"/>

  <!-- Status dots -->
  <circle cx="52" cy="32" r="4" class="dot" filter="url(#glow)"/>
  <circle cx="66" cy="32" r="4" class="dot2" filter="url(#glow)"/>
  <circle cx="80" cy="32" r="4" class="dot3" filter="url(#glow)"/>

  <!-- Prompt symbol -->
  <text x="42" y="80" font-family="'IBM Plex Mono', monospace" font-size="22" fill="#00ff88" opacity="0.15" filter="url(#glow)">❯</text>

  <!-- Main title -->
  <text x="110" y="72" class="title glow" filter="url(#glowStrong)">XSS Trainer</text>
  <rect class="cursor" x="386" y="50" width="10" height="26" rx="1"/>

  <!-- Subtitle -->
  <text x="110" y="95" class="subtitle tags-group">Interactive XSS vulnerability testing checklist</text>

  <!-- Tags -->
  <g class="tags-group">
    <!-- Tag: Reflected -->
    <rect x="110" y="108" width="75" height="20" rx="3" fill="#00ff88"/>
    <text x="116" y="122" class="tag">Reflected</text>

    <!-- Tag: DOM -->
    <rect x="192" y="108" width="52" height="20" rx="3" fill="#4a9ef0"/>
    <text x="198" y="122" class="tag">DOM</text>

    <!-- Tag: Stored -->
    <rect x="251" y="108" width="55" height="20" rx="3" fill="#f07070"/>
    <text x="257" y="122" class="tag">Stored</text>

    <!-- Tag: Pure HTML -->
    <rect x="313" y="108" width="75" height="20" rx="3" fill="#2a3a4a"/>
    <text x="319" y="122" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#8899aa">Pure HTML</text>

    <!-- Tag: No deps -->
    <rect x="395" y="108" width="70" height="20" rx="3" fill="#2a3a4a"/>
    <text x="401" y="122" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#8899aa">Zero deps</text>
  </g>

  <!-- Attack chain -->
  <g class="chain-group">
    <text x="110" y="158" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#2a3a4a">──────────────────────────────────────────────</text>
    <text x="110" y="175" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#2a3a5a">Source</text>
    <text x="162" y="175" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#1a2a3a">→</text>
    <text x="176" y="175" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#2a3a5a">Transport</text>
    <text x="244" y="175" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#1a2a3a">→</text>
    <text x="258" y="175" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#2a3a5a">Storage</text>
    <text x="312" y="175" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#1a2a3a">→</text>
    <text x="326" y="175" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#2a3a5a">Render</text>
    <text x="376" y="175" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#1a2a3a">→</text>

    <!-- Execution highlighted -->
    <text x="390" y="175" font-family="'IBM Plex Mono', monospace" font-size="11" fill="#00ff88" class="chain-active" filter="url(#glow)">Execution</text>
  </g>

  <!-- Right side: step count visual -->
  <g opacity="0.8">
    <text x="620" y="55" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#2a4a3a">// 13 steps</text>
    <text x="620" y="72" font-family="'IBM Plex Mono', monospace" font-size="28" font-weight="700" fill="#00ff88" filter="url(#glowStrong)" class="chain-active">00→12</text>
    <text x="620" y="92" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#2a4a3a">break any link</text>
    <text x="620" y="106" font-family="'IBM Plex Mono', monospace" font-size="10" fill="#2a3a5a">= no XSS</text>

    <!-- Mini progress bars -->
    <rect x="620" y="118" width="140" height="3" rx="1" fill="#1a2030"/>
    <rect x="620" y="118" width="45" height="3" rx="1" fill="#f07070" class="chain-active3"/>
    <text x="620" y="132" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#f07070">Reflected  ████░░░░░░</text>

    <rect x="620" y="136" width="140" height="3" rx="1" fill="#1a2030"/>
    <rect x="620" y="136" width="60" height="3" rx="1" fill="#4a9ef0" class="chain-active2"/>
    <text x="620" y="150" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#4a9ef0">DOM-based  █████░░░░░</text>

    <rect x="620" y="154" width="140" height="3" rx="1" fill="#1a2030"/>
    <rect x="620" y="154" width="30" height="3" rx="1" fill="#00ff88" class="chain-active"/>
    <text x="620" y="168" font-family="'IBM Plex Mono', monospace" font-size="9" fill="#00ff88">Stored     ███░░░░░░░</text>
  </g>

  <!-- Vertical separator -->
  <line x1="608" y1="30" x2="608" y2="170" stroke="#1a2535" stroke-width="1"/>

</svg>
